  name: CASTS Python Tests

  on:
    pull_request:
      paths:
        - "geaflow-ai/plugins/casts/**"
    push:
      branches: ["master"]
      paths:
        - "geaflow-ai/plugins/casts/**"
    workflow_dispatch:

  jobs:
    tests:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: geaflow-ai/plugins/casts
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
        - name: Install uv
          run: pip install uv
        - name: Sync deps
          run: uv sync
        - name: Run tests
          run: uv run pytest
